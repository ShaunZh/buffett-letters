        - heading "2024 年致股东信" [level=1] [ref=e30]
        - paragraph [ref=e31]: 巴菲特在这封 2024 年致股东信中讨论了错误与纠偏、GEICO 与保险业务、日本五大商社投资、资本配置、税收贡献以及 2025 年奥马哈股东大会安排。
      - button "切换语言显示模式" [ref=e33] [cursor=pointer]: 文
      - region "Notes tools" [ref=e35]:
        - generic [ref=e36]:
          - generic [ref=e37]:
            - strong [ref=e38]: 笔记
            - paragraph [ref=e39]: 高亮选中文本，并把重点留在当前浏览器里。
          - button "查看笔记 0" [ref=e40] [cursor=pointer]:
            - text: 查看笔记
            - generic [ref=e41]: "0"
      - region "Letter content blocks" [ref=e42]:
        - article [ref=e43]:
          - generic [ref=e44]:
            - region "English block p1" [ref=e45]:
              - paragraph [ref=e47]: "To the Shareholders of Berkshire Hathaway Inc.:"
            - region "Chinese block p1" [ref=e48]:
              - paragraph [ref=e50]: 致伯克希尔·哈撒韦公司的股东：
        - article [ref=e51]:
          - generic [ref=e52]:
            - region "English block p2" [ref=e53]:
              - paragraph [ref=e55]: This letter comes to you as part of Berkshire's annual report. As a public company, we are required to periodically tell you many specific facts and figures.
            - region "Chinese block p2" [ref=e56]:
              - paragraph [ref=e58]: 这封信作为伯克希尔年度报告的一部分送到你手中。作为一家上市公司，我们必须定期向你披露许多具体的事实和数字。
        - article [ref=e59]:
          - generic [ref=e60]:
            - region "English block p3" [ref=e61]:
              - paragraph [ref=e63]: "\"Report,\" however, implies a greater responsibility. In addition to the mandated data, we believe we owe you additional commentary about what you own and how we think. Our goal is to communicate with you in a manner that we would wish you to use if our positions were reversed - that is, if you were Berkshire's CEO while I and my family were passive investors, trusting you with our savings."
            - region "Chinese block p3" [ref=e64]:
              - paragraph [ref=e66]: 不过，“报告”一词意味着更大的责任。除了法定要求披露的数据之外，我们认为自己还欠你一些额外的说明：你究竟持有什么，以及我们是如何思考的。我们的目标，是以一种在角色互换时我们也希望你采用的方式与你沟通——也就是说，假如你是伯克希尔的 CEO，而我和我的家人只是把积蓄托付给你的被动投资者。
        - article [ref=e67]:
          - generic [ref=e68]:
            - region "English block p4" [ref=e69]:
              - paragraph [ref=e71]: "This approach leads us to an annual recitation of both good and bad developments at the many businesses you indirectly own through your Berkshire shares. When discussing problems at specific subsidiaries, we do, however, try to follow the advice Tom Murphy gave to me 60 years ago: \"praise by name, criticize by category.\""
            - region "Chinese block p4" [ref=e72]:
              - paragraph [ref=e74]: 基于这种理念，我们每年都会向你交代：你通过持有伯克希尔股票而间接拥有的众多企业里，究竟发生了哪些好事和坏事。不过，在谈到某些子公司的问题时，我们尽量遵循汤姆·墨菲 60 年前给我的建议：“表扬时点名，批评时分类。”
        - article [ref=e75]:
          - generic [ref=e76]:
            - region "English block p5" [ref=e77]:
              - paragraph [ref=e79]: Mistakes - Yes, We Make Them at Berkshire
            - region "Chinese block p5" [ref=e80]:
              - paragraph [ref=e82]: 错误——是的，我们在伯克希尔也会犯错
        - article [ref=e83]:
          - generic [ref=e84]:
            - region "English block p6" [ref=e85]:
              - paragraph [ref=e87]: Sometimes I've made mistakes in assessing the future economics of a business I've purchased for Berkshire - each a case of capital allocation gone wrong. That happens with both judgments about marketable equities - we view these as partial ownership of businesses - and the 100% acquisitions of companies.
            - region "Chinese block p6" [ref=e88]:
              - paragraph [ref=e90]: 有时候，我在判断伯克希尔所收购企业未来的经济前景时会犯错——每一次都属于资本配置出了差错。无论是对上市股票的判断——我们把它们视为企业的部分所有权——还是对整家公司 100% 收购时的判断，都会出现这种情况。
        - article [ref=e91]:
          - generic [ref=e92]:
            - region "English block p7" [ref=e93]:
              - paragraph [ref=e95]: At other times, I've made mistakes when assessing the abilities or fidelity of the managers Berkshire is hiring. The fidelity disappointments can hurt beyond their financial impact, a pain that can approach that of a failed marriage.
            - region "Chinese block p7" [ref=e96]:
              - paragraph [ref=e98]: 还有一些时候，我会在评估伯克希尔聘用的经理人能力或操守时犯错。操守上的失望，带来的痛苦常常不止于财务损失，那种疼痛感，几乎可以逼近一段失败婚姻带来的伤害。
        - article [ref=e99]:
          - generic [ref=e100]:
            - region "English block p8" [ref=e101]:
              - paragraph [ref=e103]: A decent batting average in personnel decisions is all that can be hoped for. The cardinal sin is delaying the correction of mistakes or what Charlie Munger called "thumb-sucking". Problems, he would tell me, cannot be wished away. They require action, however uncomfortable that may be.
            - region "Chinese block p8" [ref=e104]:
              - paragraph [ref=e106]: 在人事决策方面，我们所能期望的仅仅是取得尚可的准确率。真正的大忌，是迟迟不去纠正错误，也就是查理·芒格所说的“吮拇指”。他总会告诉我：问题不会因为你希望它消失就自动消失。它们需要行动，无论那样做有多不舒服。
        - article [ref=e107]:
          - generic [ref=e108]:
            - region "English block p9" [ref=e109]:
              - paragraph [ref=e111]: During the 2019-23 period, I have used the words "mistake" or "error" 16 times in my letters to you. Many other huge companies have never used either word over that span. Amazon, I should acknowledge, made some brutally candid observations in its 2021 letter. Elsewhere, it has generally been happy talk and pictures.
            - region "Chinese block p9" [ref=e112]:
              - paragraph [ref=e114]: 在 2019 到 2023 年这段时间里，我在写给你们的信中一共用了 16 次 “mistake” 或 “error” 这样的词。在此期间，许多其他大型公司从未用过这两个词。 亚马逊倒是例外，我得承认，它在 2021 年的信里做过一些非常坦率、甚至近乎“残酷诚实”的表述。除此之外，多数地方看到的通常都是一片喜气洋洋的说辞，以及配上一些漂亮图片而已。
        - article [ref=e115]:
          - generic [ref=e116]:
            - region "English block p10" [ref=e117]:
              - paragraph [ref=e119]: I have also been a director of large public companies at which "mistake" or "wrong" were forbidden words at board meetings or analyst calls. That taboo, implying managerial perfection, always made me nervous (though, at times, there could be legal issues that make limited discussion advisable. We live in a very litigious society.)
            - region "Chinese block p10" [ref=e120]:
              - paragraph [ref=e122]: 我也曾在一些大型上市公司担任董事，在那些公司的董事会会议或分析师电话会上，“mistake” 或 “wrong” 这样的词几乎是禁语。这种禁忌仿佛在暗示管理层是完美无缺的，而这总让我感到不安（当然，有时也确实可能存在法律问题，使得管理层需要对某些事项谨慎发言。毕竟我们生活在一个极其好打官司的社会里）。
        - article [ref=e123]:
          - generic [ref=e124]:
            - region "English block p11" [ref=e125]:
              - paragraph [ref=e127]: At 94, it won't be long before Greg Abel replaces me as CEO and will be writing the annual letters. Greg shares the Berkshire creed that a "report" is what a Berkshire CEO annually owes to owners. And he also understands that if you start fooling your shareholders, you will soon believe your own baloney and be fooling yourself as well.
            - region "Chinese block p11" [ref=e128]:
              - paragraph [ref=e130]: 94 岁的我，离格雷格·阿贝尔接替我担任 CEO、并亲自撰写年度信件的日子已经不远了。格雷格也认同伯克希尔的信条：所谓“报告”，就是伯克希尔 CEO 每年应当向所有者交付的东西。他同样明白，一旦你开始糊弄股东，很快你自己也会信了那套鬼话，最终连自己也一并糊弄了。
        - article [ref=e131]:
          - generic [ref=e132]:
            - region "English block p12" [ref=e133]:
              - paragraph [ref=e135]: Pete Liegl - One of a Kind
            - region "Chinese block p12" [ref=e136]:
              - paragraph [ref=e138]: 皮特·利格——独一无二的人
        - article [ref=e139]:
          - generic [ref=e140]:
            - region "English block p13" [ref=e141]:
              - paragraph [ref=e143]: Let me pause to tell you the remarkable story of Pete Liegl, a man unknown to most Berkshire shareholders but one who contributed many billions to their aggregate wealth. Pete died in November, still working at 80.
            - region "Chinese block p13" [ref=e144]:
              - paragraph [ref=e146]: 让我暂停一下，讲讲皮特·利格这个了不起的故事。大多数伯克希尔股东并不认识他，但他为股东整体财富贡献了数十亿美元。皮特在去年 11 月去世，离世时 80 岁，仍在工作。
        - article [ref=e147]:
          - generic [ref=e148]:
            - region "English block p14" [ref=e149]:
              - paragraph [ref=e151]: I first heard of Forest River - the Indiana company Pete founded and managed - on June 21, 2005. On that day I received a letter from an intermediary detailing relevant data about the company, a recreational vehicle ("RV") manufacturer. The writer said that Pete, the 100% owner of Forest River, specifically wanted to sell to Berkshire. He also told me the price that Pete expected to receive. I liked this no-nonsense approach.
            - region "Chinese block p14" [ref=e152]:
              - paragraph [ref=e154]: 我第一次听说森林河公司（Forest River）——也就是由皮特创立并经营的那家印第安纳州企业——是在 2005 年 6 月 21 日。那天，我收到一位中间人写来的信，里面列出了这家公司的相关数据。森林河是一家房车（RV）制造商。来信人说，作为森林河 100% 的所有者，皮特明确表示希望把公司卖给伯克希尔，并直接告诉了我他期望的价格。我很喜欢这种不拐弯抹角的方式。
        - article [ref=e155]:
          - generic [ref=e156]:
            - region "English block p15" [ref=e157]:
              - paragraph [ref=e159]: I did some checking with RV dealers, liked what I learned and arranged a June 28th meeting in Omaha. Pete brought along his wife, Sharon, and daughter, Lisa. When we met, Pete assured me that he wanted to keep running the business but would feel more comfortable if he could assure financial security for his family.
            - region "Chinese block p15" [ref=e160]:
              - paragraph [ref=e162]: 我随后找几位房车经销商做了些了解，对得到的信息很满意，于是安排了 6 月 28 日在奥马哈见面。皮特带来了他的妻子 Sharon 和女儿 Lisa。我们见面时，皮特向我表示，他想继续经营这家公司，但如果能先为家人锁定财务上的安全感，他会更安心。
        - article [ref=e163]:
          - generic [ref=e164]:
            - region "English block p16" [ref=e165]:
              - paragraph [ref=e167]: Pete next mentioned that he owned some real estate that was leased to Forest River and had not been covered in the June 21 letter. Within a few minutes, we arrived at a price for those assets as I expressed no need for appraisal by Berkshire but would simply accept his valuation.
            - region "Chinese block p16" [ref=e168]:
              - paragraph [ref=e170]: 接着，皮特提到他还拥有一些出租给森林河使用的房地产，而这些资产并未包含在 6 月 21 日那封信里。几分钟内，我们就为这些资产谈妥了价格，因为我表示，伯克希尔不需要再做评估，我愿意直接接受他的估值。
        - article [ref=e171]:
          - generic [ref=e172]:
            - region "English block p17" [ref=e173]:
              - paragraph [ref=e175]: Then we arrived at the other point that needed clarity. I asked Pete what his compensation should be, adding that whatever he said, I would accept. (This, I should add, is not an approach I recommend for general use.)
            - region "Chinese block p17" [ref=e176]:
              - paragraph [ref=e178]: 然后，我们谈到了另一个需要说清楚的问题。我问皮特，他觉得自己应拿多少薪酬，并补充说：无论他说什么，我都会接受。（顺便说一句，这并不是我建议普遍采用的谈判方式。）
        - article [ref=e179]:
          - generic [ref=e180]:
            - region "English block p18" [ref=e181]:
              - paragraph [ref=e183]: "Pete paused as his wife, daughter and I leaned forward. Then he surprised us: \"Well, I looked at Berkshire's proxy statement and I wouldn't want to make more than my boss, so pay me $100,000 per year.\" After I picked myself off the floor, Pete added: \"But we will earn X this year, and I would like an annual bonus of 10% of any earnings above what the company is now delivering.\" I replied: \"OK Pete, but if Forest River makes any significant acquisitions we will make an appropriate adjustment for the additional capital thus employed.\" I didn't define \"appropriate\" or \"significant,\" but those vague terms never caused a problem."
            - region "Chinese block p18" [ref=e184]:
              - paragraph [ref=e186]: 当时我、他的妻子和女儿都不由自主地往前探身，等着听答案。结果他让我们大吃一惊：“我看过伯克希尔的委托书，我不想赚得比老板还多，所以每年给我 10 万美元就行。”等我从震惊中缓过来后，皮特又补充说：“不过，今年我们会赚到 X（他报了一个数字），我希望公司利润若高于当前水平，超出的部分能按 10% 给我年终奖金。”我回答说：“好，皮特。但如果森林河做了重大收购，我们会对新增投入资本做相应调整。”我当时并没有界定“相应”或“重大”的具体含义，但后来这些模糊措辞从未带来问题。
        - article [ref=e187]:
          - generic [ref=e188]:
            - region "English block p19" [ref=e189]:
              - paragraph [ref=e191]: The four of us then went to dinner at Omaha's Happy Hollow Club and lived happily ever after. During the next 19 years, Pete shot the lights out. No competitor came close to his performance.
            - region "Chinese block p19" [ref=e192]:
              - paragraph [ref=e194]: 随后，我们四个人一起去奥马哈的 Happy Hollow Club 吃了晚饭，之后的故事就像童话里说的那样“从此幸福地生活在一起”。在接下来的 19 年里，皮特的业绩惊人得耀眼，没有任何竞争对手能接近他的表现。
        - article [ref=e195]:
          - generic [ref=e196]:
            - region "English block p20" [ref=e197]:
              - paragraph [ref=e199]: Every company doesn't have an easy-to-understand business and there are very few owners or managers like Pete. And, of course, I expect to make my share of mistakes about the businesses Berkshire buys and sometimes err in evaluating the sort of person with whom I'm dealing.
            - region "Chinese block p20" [ref=e200]:
              - paragraph [ref=e202]: 并不是每家公司都拥有一个一看就懂的生意模式，也并不是所有企业主或经理人都像皮特这样出色。当然，我也完全预期自己会在伯克希尔收购的企业上犯下一些错误，也会在判断打交道的人到底是什么样的人时偶尔看走眼。
        - article [ref=e203]:
          - generic [ref=e204]:
            - region "English block p21" [ref=e205]:
              - paragraph [ref=e207]: But I've also had many pleasant surprises in both the potential of the business as well as the ability and fidelity of the manager. And our experience is that a single winning decision can make a breathtaking difference over time. Think GEICO as a business decision, Ajit Jain as a managerial decision and my luck in finding Charlie Munger as a one-of-a-kind partner, personal advisor and steadfast friend. Mistakes fade away; winners can forever blossom.
            - region "Chinese block p21" [ref=e208]:
              - paragraph [ref=e210]: 但与此同时，我也曾多次在企业的潜力、以及经理人的能力与操守方面收获令人愉快的惊喜。我们的经验表明，一次正确的重大决策，随着时间推移，足以带来惊人的差异。比如，把 GEICO 看作一项业务决策，把 Ajit Jain 看作一项用人决策，再把我有幸遇到查理·芒格这位独一无二的合伙人、私人顾问和坚定朋友，看作人生运气。错误终会淡去，而赢家可以长久绽放。
        - article [ref=e211]:
          - generic [ref=e212]:
            - region "English block p22" [ref=e213]:
              - paragraph [ref=e215]: "One further point in our CEO selections: I never look at where a candidate has gone to school. Never!"
            - region "Chinese block p22" [ref=e216]:
              - paragraph [ref=e218]: 关于 CEO 的选择，我还想补充一点：我从不看候选人读过哪所学校。绝不看！
        - article [ref=e219]:
          - generic [ref=e220]:
            - region "English block p23" [ref=e221]:
              - paragraph [ref=e223]: Of course, there are great managers who attended the most famous schools. But there are plenty such as Pete who may have benefitted by attending a less prestigious institution or even by not bothering to finish school. Look at my friend, Bill Gates, who decided that it was far more important to get underway in an exploding industry that would change the world than it was to stick around for a parchment that he could hang on the wall.
            - region "Chinese block p23" [ref=e224]:
              - paragraph [ref=e226]: 当然，毕业于顶尖名校的优秀管理者比比皆是。但也有很多像皮特这样的人，反而可能从没进名校，甚至没有把学业读完，却更受益。看看我的朋友比尔·盖茨吧，他觉得，与其留下来拿一张挂在墙上的文凭，不如立刻投身那个正要改变世界的爆发式增长行业，这显然重要得多。
        - article [ref=e227]:
          - generic [ref=e228]:
            - region "English block p24" [ref=e229]:
              - paragraph [ref=e231]: "Not long ago, I met - by phone - Jessica Toonkel, whose step-grandfather, Ben Rosner, long ago ran a business for Charlie and me. Ben was a retailing genius and, in preparing for this report, I checked with Jessica to confirm Ben's schooling, which I remembered as limited. Jessica's reply: \"Ben never went past 6th grade.\""
            - region "Chinese block p24" [ref=e232]:
              - paragraph [ref=e234]: 不久前，我通过电话结识了 Jessica Toonkel。她的继外祖父 Ben Rosner 很久以前曾替查理和我经营一家企业。Ben 是个零售业天才。为了写这封报告，我向 Jessica 核实了他的教育背景——我印象里他的受教育程度很有限。Jessica 的回答是：“Ben 连六年级都没读完。”
        - article [ref=e235]:
          - generic [ref=e236]:
            - region "English block p25" [ref=e237]:
              - paragraph [ref=e239]: I was lucky enough to get an education at three fine universities. And I avidly believe in lifelong learning. I've observed, however, that a very large portion of business talent is innate with nature swamping nurture. Pete Liegl was a natural.
            - region "Chinese block p25" [ref=e240]:
              - paragraph [ref=e242]: 我很幸运，曾在三所优秀大学接受教育，而且我一直非常相信终身学习的重要性。但我的观察是：商业才能中有相当大的一部分是天生的，天赋往往压倒后天培养。皮特·利格就是天生的那种人。
        - article [ref=e243]:
          - generic [ref=e244]:
            - region "English block p26" [ref=e245]:
              - paragraph [ref=e247]: Last Year's Performance
            - region "Chinese block p26" [ref=e248]:
              - paragraph [ref=e250]: 去年的表现
        - article [ref=e251]:
          - generic [ref=e252]:
            - region "English block p27" [ref=e253]:
              - paragraph [ref=e255]: In 2024, Berkshire did better than I expected though 53% of our 189 operating businesses reported a decline in earnings. We were aided by a predictable large gain in investment income as Treasury Bill yields improved and we substantially increased our holdings of these highly-liquid short-term securities.
            - region "Chinese block p27" [ref=e256]:
              - paragraph [ref=e258]: 2024 年，伯克希尔的表现比我原本预期更好，尽管我们 189 家运营企业中有 53% 的盈利出现了下滑。帮助我们的一项重要因素，是国库券收益率上升带来了可预期的可观投资收益，而我们也大幅增加了这类高流动性短期证券的持仓。
        - article [ref=e259]:
          - generic [ref=e260]:
            - region "English block p28" [ref=e261]:
              - paragraph [ref=e263]: Our insurance business also delivered a major increase in earnings, led by the performance of GEICO. In five years, Todd Combs has reshaped GEICO in a major way, increasing efficiency and bringing underwriting practices up to date. GEICO was a long-held gem that needed major repolishing, and Todd has worked tirelessly in getting the job done. Though not yet complete, the 2024 improvement was spectacular.
            - region "Chinese block p28" [ref=e264]:
              - paragraph [ref=e266]: 我们的保险业务也实现了大幅增利，其中最亮眼的是 GEICO 的表现。五年时间里，Todd Combs 对 GEICO 进行了大刀阔斧的重塑，提高了效率，并让承保流程跟上了时代。GEICO 是一块持有已久的宝石，只是需要认真重新打磨，而 Todd 为此不知疲倦地工作。尽管这项工作尚未完全结束，但 2024 年的改善已经堪称惊艳。
        - article [ref=e267]:
          - generic [ref=e268]:
            - region "English block p29" [ref=e269]:
              - paragraph [ref=e271]: In general, property-casualty ("P/C") insurance pricing strengthened during 2024, reflecting a major increase in damage from convective storms. Climate change may have been announcing its arrival. However, no "monster" event occurred during 2024. Someday, any day, a truly staggering insurance loss will occur - and there is no guarantee that there will be only one per annum.
            - region "Chinese block p29" [ref=e272]:
              - paragraph [ref=e274]: 总体而言，2024 年财产险和意外险（P/C）的定价趋于坚挺，这反映了强对流风暴造成的损失大幅上升。气候变化或许已经在“宣告登场”。不过，2024 年并没有发生那种“怪兽级”的灾难事件。但总有一天，也可能是任何一天，真正惊人的保险损失会出现，而且不能保证一年里只会来一次。
        - article [ref=e275]:
          - generic [ref=e276]:
            - region "English block p30" [ref=e277]:
              - paragraph [ref=e279]: The P/C business is so central to Berkshire that it warrants a further discussion that appears later in this letter. Berkshire's railroad and utility operations, our two largest businesses outside of insurance, improved their aggregate earnings. Both, however, have much left to accomplish. Late in the year we increased our ownership of the utility operation from about 92% to 100% at a cost of roughly $3.9 billion, of which $2.9 billion was paid in cash with a balance in Berkshire "B" shares.
            - region "Chinese block p30" [ref=e280]:
              - paragraph [ref=e282]: 财险业务对伯克希尔如此核心，以至于我会在这封信后文中专门再谈。除保险之外，我们最大的两项业务——铁路与公用事业——合计盈利有所改善，但这两项业务都还有很多工作要做。去年年底，我们把公用事业业务的持股比例从大约 92% 提高到 100%，交易总成本约为 39 亿美元，其中 29 亿美元以现金支付，其余部分用伯克希尔 B 类股支付。
        - article [ref=e283]:
          - generic [ref=e284]:
            - region "English block p31" [ref=e285]:
              - paragraph [ref=e287]: All told, we recorded operating earnings of $47.4 billion in 2024. We regularly - endlessly, some readers may groan - emphasize this measure rather than the GAAP-mandated earnings that are reported on page K-68.
            - region "Chinese block p31" [ref=e288]:
              - paragraph [ref=e290]: 总的来说，2024 年我们的营业利润达到 474 亿美元。我们经常——有些读者也许会抱怨说是没完没了地——强调这个指标，而不是强调 K-68 页按 GAAP 必须披露的会计利润。
        - article [ref=e291]:
          - generic [ref=e292]:
            - region "English block p32" [ref=e293]:
              - paragraph [ref=e295]: Our measure excludes capital gains or losses on the stocks and bonds we own, whether realized or unrealized. Over time, we think it highly likely that gains will prevail - why else would we buy these securities? - though the year-by-year numbers will swing wildly and unpredictably. Our horizon for such commitments is almost always far longer than a single year. In many, our thinking involves decades. These long-termers are the purchases that sometimes make the cash register ring like church bells.
            - region "Chinese block p32" [ref=e296]:
              - paragraph [ref=e298]: 我们采用的这个指标，不包括我们持有的股票和债券所产生的资本利得或损失，无论这些收益或损失是否已经实现。从长期看，我们认为获利的概率非常高——否则我们为什么要买这些证券？——但逐年数字会剧烈波动，且难以预测。我们对这类投入的时间视野几乎总是远远超过一年，很多时候我们的思考周期以几十年计算。这些长期持有的投资，才是有时会让“收银机像教堂钟声一样响起来”的那类买卖。
