        - article [ref=e405]:
          - generic [ref=e406]:
            - region "English block p34" [ref=e407]:
              - paragraph [ref=e409]: Surprise, Surprise! An Important American Record is Smashed
            - region "Chinese block p34" [ref=e410]:
              - paragraph [ref=e412]: 非常惊喜！一项重要的美国纪录被打破了
        - article [ref=e413]:
          - generic [ref=e414]:
            - region "English block p35" [ref=e415]:
              - paragraph [ref=e417]: "Sixty years ago, present management took control of Berkshire. That move was a mistake - my mistake - and one that plagued us for two decades. Charlie, I should emphasize, spotted my obvious error immediately: Though the price I paid for Berkshire looked cheap, its business - a large northern textile operation - was headed for extinction."
            - region "Chinese block p35" [ref=e418]:
              - paragraph [ref=e420]: 60 年前，现在这届管理层接管了伯克希尔。那是一个错误——是我的错误——而且这个错误困扰了我们整整 20 年。我要特别强调，查理一眼就看出了这个显而易见的问题：虽然我当时买下伯克希尔的价格看起来很便宜，但它的主营业务——一家北方大型纺织企业——实际上正走向灭亡。
        - article [ref=e421]:
          - generic [ref=e422]:
            - region "English block p36" [ref=e423]:
              - paragraph [ref=e425]: The U.S. Treasury, of all places, had already received silent warnings of Berkshire's destiny. In 1965, the company did not pay a dime of income tax, an embarrassment that had generally prevailed at the company for a decade. That sort of economic behavior may be understandable for glamorous startups, but it's a blinking yellow light when it happens at a venerable pillar of American industry. Berkshire was headed for the ash can.
            - region "Chinese block p36" [ref=e426]:
              - paragraph [ref=e428]: 最先无声收到伯克希尔命运预警的，居然是美国财政部。1965 年，这家公司一分钱所得税都没交，而这种尴尬状况在它身上其实已经持续了大约十年。对一些光鲜的新创企业来说，这样的经济表现或许还能理解；但若发生在一家曾经是美国工业支柱的老牌企业身上，那就是不断闪烁的黄灯了。伯克希尔当时正走向废纸篓。
        - article [ref=e429]:
          - generic [ref=e430]:
            - region "English block p37" [ref=e431]:
              - paragraph [ref=e433]: Fast forward 60 years and imagine the surprise at the Treasury when that same company - still operating under the name of Berkshire Hathaway - paid far more in corporate income tax than the U.S. government had ever received from any company - even the American tech titans that commanded market values in the trillions. To be precise, Berkshire last year made four payments to the IRS that totaled $26.8 billion. That's about 5% of what all of corporate America paid. In addition, we paid sizable amounts for income taxes to foreign governments and to 44 states.
            - region "Chinese block p37" [ref=e434]:
              - paragraph [ref=e436]: 把时间快进 60 年，你就能想象财政部会有多惊讶：同一家公司——仍旧叫伯克希尔·哈撒韦——缴纳的企业所得税，竟比美国政府历史上从任何一家公司收到的都多，甚至超过那些市值以万亿美元计的美国科技巨头。具体来说，去年伯克希尔向美国国税局一共缴了 4 笔税款，合计 268 亿美元，大约占全美国企业所得税总额的 5%。此外，我们还向外国政府以及美国 44 个州缴纳了数额可观的所得税。
        - article [ref=e437]:
          - generic [ref=e438]:
            - region "English block p38" [ref=e439]:
              - paragraph [ref=e441]: "Note one crucial factor allowing this record-shattering payment: Berkshire shareholders during the same 1965-2024 period received only one cash dividend. On January 3, 1967, we disbursed our sole payment - $101,755 or 10 cents per A share. I can't remember why I suggested this action to Berkshire's board of directors. Now it seems like a bad dream."
            - region "Chinese block p38" [ref=e442]:
              - paragraph [ref=e444]: 请注意一个让这笔破纪录税款成为可能的关键因素：在 1965 到 2024 年的同一时期里，伯克希尔股东只拿到过一次现金分红。那是 1967 年 1 月 3 日，我们发出了唯一一笔分红——总额 101,755 美元，也就是每股 A 股 10 美分。我已经不记得自己当时为什么会向董事会提出这个建议。现在回想起来，它更像一场噩梦。
        - article [ref=e445]:
          - generic [ref=e446]:
            - region "English block p39" [ref=e447]:
              - paragraph [ref=e449]: For sixty years, Berkshire shareholders endorsed continuous reinvestment and that enabled the company to build its taxable income. Cash income-tax payments to the U.S. Treasury, miniscule in the first decade, now aggregate more than $101 billion - and counting.
            - region "Chinese block p39" [ref=e450]:
              - paragraph [ref=e452]: 六十年来，伯克希尔股东始终支持持续再投资，这使得公司得以不断积累应税利润。最初十年里几乎微不足道的现金所得税支付，到今天累计已超过 1010 亿美元，而且这个数字还在继续增长。
        - article [ref=e453]:
          - generic [ref=e454]:
            - region "English block p40" [ref=e455]:
              - paragraph [ref=e457]: Huge numbers can be hard to visualize. Let me recast the $26.8 billion that we paid last year. If Berkshire had sent the Treasury a $1 million check every 20 minutes throughout all of 2024 - visualize 366 days and nights because 2024 was a leap year - we still would have owed the federal government a significant sum at yearend. Indeed, it would be well into January before the Treasury would tell us that we could take a short breather, get some sleep, and prepare for our 2025 tax payments.
            - region "Chinese block p40" [ref=e458]:
              - paragraph [ref=e460]: 巨大的数字往往难以形成直观感受。让我换个方式描述去年支付的 268 亿美元税款：如果伯克希尔在 2024 全年里每 20 分钟就向财政部寄出一张 100 万美元的支票——请记得 2024 年是闰年，有 366 个昼夜——到年底时我们依然还欠联邦政府一大笔钱。事实上，要一直到 1 月中旬之后，财政部才会告诉我们：你们可以先喘口气、睡会儿觉，然后准备交 2025 年的税了。
        - article [ref=e461]:
          - generic [ref=e462]:
            - region "English block p41" [ref=e463]:
              - paragraph [ref=e465]: Where Your Money Is
            - region "Chinese block p41" [ref=e466]:
              - paragraph [ref=e468]: 你的钱投向了哪里
        - article [ref=e469]:
          - generic [ref=e470]:
            - region "English block p42" [ref=e471]:
              - paragraph [ref=e473]: Berkshire's equity activity is ambidextrous. In one hand we own control of many businesses, holding at least 80% of the investee's shares. Generally, we own 100%. These 189 subsidiaries have similarities to marketable common stocks but are far from identical. The collection is worth many hundreds of billions and includes a few rare gems, many good-but-far-from-fabulous businesses and some laggards that have been disappointments. We own nothing that is a major drag, but we have a number that I should not have purchased.
            - region "Chinese block p42" [ref=e474]:
              - paragraph [ref=e476]: 伯克希尔在权益投资上的做法是“双手并用”的。一只手，我们控制着许多企业，通常持有被投资公司至少 80% 的股份，很多情况下更是 100% 全资拥有。这 189 家子公司与上市普通股投资有相似之处，但绝不相同。它们整体价值高达数千亿美元，其中有少数难得的瑰宝、许多不错但远谈不上卓越的企业，也有一些让人失望的落后者。我们并没有持有任何真正构成重大拖累的业务，但确实有若干家，是我本不该买下来的。
        - article [ref=e477]:
          - generic [ref=e478]:
            - region "English block p43" [ref=e479]:
              - paragraph [ref=e481]: In the other hand, we own a small percentage of a dozen or so very large and highly profitable businesses with household names such as Apple, American Express, Coca-Cola and Moody's. Many of these companies earn very high returns on the net tangible equity required for their operations. At yearend, our partial-ownership holdings were valued at $272 billion. Understandably, really outstanding businesses are very seldom offered in their entirety, but small fractions of these gems can be purchased Monday through Friday on Wall Street and, very occasionally, they sell at bargain prices.
            - region "Chinese block p43" [ref=e482]:
              - paragraph [ref=e484]: 另一只手，我们持有十几家规模极大、盈利能力极强、且家喻户晓企业的一小部分股权，比如苹果、美国运通、可口可乐和穆迪。许多这样的公司，只需要很少的净有形资本就能取得极高回报。到年末，我们这些“部分持股”的投资市值达到 2720 亿美元。可以理解，真正卓越的企业几乎不会整家拿出来卖；但这些瑰宝的小小一部分股权，周一到周五都可以在华尔街买到，而且极少数时候，它们还会以便宜价格出售。
        - article [ref=e485]:
          - generic [ref=e486]:
            - region "English block p44" [ref=e487]:
              - paragraph [ref=e489]: We are impartial in our choice of equity vehicles, investing in either variety based upon where we can best deploy your and my family's savings. Often, nothing looks compelling; very infrequently we find ourselves knee-deep in opportunities. Greg has vividly shown his ability to act at such times as did Charlie.
            - region "Chinese block p44" [ref=e490]:
              - paragraph [ref=e492]: 在选择权益投资载体时，我们并没有偏见。无论是控股收购还是少数股权投资，我们只看哪里最适合部署你们的资金和我家族的资金。大多数时候，市场上并没有什么特别诱人的机会；极少数时候，机会会多到让人“陷在里面”。在这种时刻，格雷格已经非常鲜明地展现出自己的行动能力，正如查理当年一样。
        - article [ref=e493]:
          - generic [ref=e494]:
            - region "English block p45" [ref=e495]:
              - paragraph [ref=e497]: With marketable equities, it is easier to change course when I make a mistake. Berkshire's present size, it should be underscored, diminishes this valuable option. We can't come and go on a dime. Sometimes a year or more is required to establish or divest an investment. Additionally, with ownership of minority positions we can't change management if that action is needed or control what is done with capital flows if we are unhappy with the decisions being made.
            - region "Chinese block p45" [ref=e498]:
              - paragraph [ref=e500]: 对于上市股票来说，一旦我犯了错，掉头会更容易一些。不过需要强调的是，伯克希尔如今的体量削弱了这种宝贵的灵活性。我们没法像按个硬币那样说进就进、说出就出。有时，建仓或清仓一项投资都需要一年甚至更久。此外，当我们持有的是少数股权时，如果我们认为有必要更换管理层，我们也做不到；如果我们不满意对方的资本配置决策，我们同样无法直接控制资金流向。
        - article [ref=e501]:
          - generic [ref=e502]:
            - region "English block p46" [ref=e503]:
              - paragraph [ref=e505]: With controlled companies, we can dictate these decisions, but we have far less flexibility in the disposition of mistakes. In reality, Berkshire almost never sells controlled businesses unless we face what we believe to be unending problems. An offset is that some business owners seek out Berkshire because of our steadfast behavior. Occasionally, that can be a decided plus for us.
            - region "Chinese block p46" [ref=e506]:
              - paragraph [ref=e508]: 而在控股企业中，我们可以主导这些决策，但在处理错误时的灵活性就小得多。现实中，除非我们相信某项问题会无休止地持续下去，否则伯克希尔几乎不会卖掉一家控股企业。另一方面，也正因为我们这种稳健、坚定的风格，一些企业主会主动来找伯克希尔出售企业。偶尔，这会成为我们明显的优势。
        - article [ref=e509]:
          - generic [ref=e510]:
            - region "English block p47" [ref=e511]:
              - paragraph [ref=e513]: Despite what some commentators currently view as an extraordinary cash position at Berkshire, the great majority of your money remains in equities. That preference won't change. While our ownership in marketable equities moved downward last year from $354 billion to $272 billion, the value of our non-quoted controlled equities increased somewhat and remains far greater than the value of the marketable portfolio.
            - region "Chinese block p47" [ref=e514]:
              - paragraph [ref=e516]: 尽管一些评论人士现在把伯克希尔的现金头寸视作“异常高”，但你们的大部分资金依然配置在权益资产上，而且这种偏好不会改变。虽然去年我们的上市股票持仓市值从 3540 亿美元下降到了 2720 亿美元，但我们那些未上市的控股权益价值则有所上升，而且仍然远高于上市投资组合的价值。
        - article [ref=e517]:
          - generic [ref=e518]:
            - region "English block p48" [ref=e519]:
              - paragraph [ref=e521]: Berkshire shareholders can rest assured that we will forever deploy a substantial majority of their money in equities - mostly American equities although many of these will have international operations of significance. Berkshire will never prefer ownership of cash-equivalent assets over the ownership of good businesses, whether controlled or only partially owned.
            - region "Chinese block p48" [ref=e522]:
              - paragraph [ref=e524]: 伯克希尔股东可以放心，我们会永远把绝大部分资金配置在权益资产上——其中主要是美国企业的权益，尽管很多公司本身也拥有重要的国际业务。无论是控股还是部分持股，伯克希尔都不会把持有类现金资产放在持有优秀企业之上。
        - article [ref=e525]:
          - generic [ref=e526]:
            - region "English block p49" [ref=e527]:
              - paragraph [ref=e529]: Paper money can see its value evaporate if fiscal folly prevails. In some countries, this reckless practice has become habitual, and, in our country's short history, the U.S. has come close to the edge. Fixed-coupon bonds provide no protection against runaway currency.
            - region "Chinese block p49" [ref=e530]:
              - paragraph [ref=e532]: 如果财政上的愚蠢行为占了上风，纸币的价值就可能蒸发。在一些国家，这种鲁莽做法已经成了习惯；而在我们国家并不算长的历史中，美国也曾经逼近过那条边缘。固定票息债券并不能为失控的货币贬值提供保护。
        - article [ref=e533]:
          - generic [ref=e534]:
            - region "English block p50" [ref=e535]:
              - paragraph [ref=e537]: Businesses, as well as individuals with desired talents, however, will usually find a way to cope with monetary instability as long as their goods or services are desired by the country's citizenry. So, too, with personal skills. Lacking such assets as athletic excellence, a wonderful voice, medical or legal skills or, for that matter, any special talents, I have had to rely on equities throughout my life. In effect, I have depended on the success of American businesses and I will continue to do so.
            - region "Chinese block p50" [ref=e538]:
              - paragraph [ref=e540]: 然而，只要一家企业提供的商品或服务仍被国民需要，它通常总能找到办法应对货币不稳定；拥有市场所需才能的个人也是如此。至于我本人，既没有卓越的运动能力，也没有美妙的嗓音，没有医学或法律技能，事实上也没有什么特别的天赋，所以我一生都只能依靠权益投资。换句话说，我一直依赖于美国企业的成功，今后也仍会如此。
        - article [ref=e541]:
          - generic [ref=e542]:
            - region "English block p51" [ref=e543]:
              - paragraph [ref=e545]: One way or another, the sensible - better yet imaginative - deployment of savings by citizens is required to propel an ever-growing societal output of desired goods and services. This system is called capitalism. It has its faults and abuses - in certain respects more egregious now than ever - but it also can work wonders unmatched by other economic systems. America is Exhibit A.
            - region "Chinese block p51" [ref=e546]:
              - paragraph [ref=e548]: 无论采取什么方式，公民储蓄都必须被明智地——最好是富有想象力地——配置，才能推动社会持续扩大其所需商品和服务的产出。这个体系就叫资本主义。它有缺点，也有滥用——而且在某些方面，如今的表现甚至比以往更糟——但它所能创造的奇迹，仍是其他经济制度难以匹敌的。美国就是最好的例证。
        - article [ref=e549]:
          - generic [ref=e550]:
            - region "English block p52" [ref=e551]:
              - paragraph [ref=e553]: Our country's progress over its mere 235 years of existence could not have been imagined by even the most optimistic colonists in 1789, when the Constitution was adopted and the country's energies were unleashed. True, our country in its infancy sometimes borrowed abroad to supplement our own savings. But, concurrently, we needed many Americans to consistently save and then needed those savers or other Americans to wisely deploy the capital thus made available. If America had consumed all that it produced, the country would have been spinning its wheels.
            - region "Chinese block p52" [ref=e554]:
              - paragraph [ref=e556]: 在这个国家仅仅 235 年的历史中取得的进步，就连 1789 年宪法通过、国家活力刚被释放出来时最乐观的殖民者也无法想象。诚然，在国家早期，我们有时需要向国外借款来补充本国储蓄；但与此同时，我们也需要大量美国人持续储蓄，并且需要这些储蓄者，或其他美国人，把这些资本明智地投出去。如果美国把自己生产的一切都消费掉，这个国家只能原地空转。
        - article [ref=e557]:
          - generic [ref=e558]:
            - region "English block p53" [ref=e559]:
              - paragraph [ref=e561]: The American process has not always been pretty - our country has forever had many scoundrels and promoters who seek to take advantage of those who mistakenly trust them with their savings. But even with such malfeasance - which remains in full force today - and also much deployment of capital that eventually floundered because of brutal competition or disruptive innovation, the savings of Americans has delivered a quantity and quality of output beyond the dreams of any colonist. From a base of only four million people - and despite a brutal internal war early on, pitting one American against another - America changed the world in the blink of a celestial eye.
            - region "Chinese block p53" [ref=e562]:
              - paragraph [ref=e564]: 美国的发展过程从来都不总是漂亮的——这个国家一直都有大量骗子和吹鼓手，试图利用那些误把储蓄托付给他们的人。但即使存在这样的恶行——而且今天依旧火力全开——再加上大量资本最终因残酷竞争或颠覆式创新而折戟，美国人的储蓄所创造出来的产出，无论数量还是质量，依然远远超出了任何一位殖民者的想象。美国从仅有 400 万人口的基础起步，尽管早期还经历过一场让美国人彼此厮杀的惨烈内战，却仍在天体眨眼般短暂的时刻里改变了世界。
        - article [ref=e565]:
          - generic [ref=e566]:
            - region "English block p54" [ref=e567]:
              - paragraph [ref=e569]: In a very minor way, Berkshire shareholders have participated in the American miracle by foregoing dividends, thereby electing to reinvest rather than consume. Originally, this reinvestment was tiny, almost meaningless, but over time, it mushroomed, reflecting the mixture of a sustained culture of savings, combined with the magic of long-term compounding. Berkshire's activities now impact all corners of our country. And we are not finished. Companies die for many reasons but, unlike the fate of humans, old age itself is not lethal. Berkshire today is far more youthful than it was in 1965.
            - region "Chinese block p54" [ref=e570]:
              - paragraph [ref=e572]: 以一种很小的方式，伯克希尔股东也通过放弃分红、选择再投资而不是消费，参与了这场美国奇迹。最初，这种再投资微不足道，几乎没有意义；但随着时间推移，它像滚雪球一样膨胀起来，体现了长期储蓄文化与长期复利魔法的结合。如今，伯克希尔的业务已经影响到美国的方方面面。而且我们还没结束。企业会因很多原因死亡，但和人类不同，年老本身并不致命。今天的伯克希尔，比 1965 年时年轻得多。
        - article [ref=e573]:
          - generic [ref=e574]:
            - region "English block p55" [ref=e575]:
              - paragraph [ref=e577]: However, as Charlie and I have always acknowledged, Berkshire would not have achieved its results in any locale except America whereas America would have been every bit the success it has been if Berkshire had never existed.
            - region "Chinese block p55" [ref=e578]:
              - paragraph [ref=e580]: 不过，正如查理和我一直承认的那样：如果不在美国，伯克希尔不可能取得今天的成绩；而即使伯克希尔从未存在，美国依然会成为今天这样成功的美国。
        - article [ref=e581]:
          - generic [ref=e582]:
            - region "English block p56" [ref=e583]:
              - paragraph [ref=e585]: So thank you, Uncle Sam. Someday your nieces and nephews at Berkshire hope to send you even larger payments than we did in 2024. Spend it wisely. Take care of the many who, for no fault of their own, get the short straws in life. They deserve better. And never forget that we need you to maintain a stable currency and that result requires both wisdom and vigilance on your part.
            - region "Chinese block p56" [ref=e586]:
              - paragraph [ref=e588]: 所以，谢谢你，山姆大叔。总有一天，你在伯克希尔的这些侄子侄女们，希望能给你寄去比 2024 年更大的款项。请把钱花得明智一些。请照顾好那些并非因为自己的过错而在生活中抽到短签的人，他们理应拥有更好的处境。还有，别忘了，我们需要你维护一种稳定的货币，而做到这一点，需要你既有智慧，也保持警觉。
        - article [ref=e589]:
          - generic [ref=e590]:
            - region "English block p57" [ref=e591]:
              - paragraph [ref=e593]: Property-Casualty Insurance
            - region "Chinese block p57" [ref=e594]:
              - paragraph [ref=e596]: 财产与意外伤害保险
        - article [ref=e597]:
          - generic [ref=e598]:
            - region "English block p58" [ref=e599]:
              - paragraph [ref=e601]: P/C insurance continues to be Berkshire's core business. The industry follows a financial model that is rare - very rare - among giant businesses. Customarily, companies incur costs for labor, materials, inventories, plant and equipment, etc. before - or concurrently with - the sale of their products or services. Consequently, their CEOs have a good fix on knowing the cost of their product before they sell it. If the selling price is less than its cost, managers soon learn they have a problem. Hemorrhaging cash is hard to ignore.
            - region "Chinese block p58" [ref=e602]:
              - paragraph [ref=e604]: 财产险和意外险业务仍然是伯克希尔的核心业务。这个行业采用的财务模式，在大型企业中非常罕见——极其罕见。通常，企业会在销售产品或服务之前，或至少在同时，先承担人工、材料、库存、厂房设备等成本。因此，CEO 在出售产品前，往往已经大致知道其成本。如果售价低于成本，管理层很快就会知道自己出问题了。现金持续失血，是很难被忽视的。
        - article [ref=e605]:
          - generic [ref=e606]:
            - region "English block p59" [ref=e607]:
              - paragraph [ref=e609]: When writing P/C insurance, we receive payment upfront and much later learn what our product has cost us - sometimes a moment of truth that is delayed as much as 30 or more years. We are still making substantial payments on asbestos exposures that occurred 50 or more years ago.
            - region "Chinese block p59" [ref=e610]:
              - paragraph [ref=e612]: 但在承保财产险和意外险时，我们是先把保费收进来，很久以后才知道这份“产品”究竟花了我们多少钱——有时揭晓真相的时刻会晚到 30 年甚至更久。我们今天仍在为 50 多年前发生的石棉风险敞口支付大额赔款。
        - article [ref=e613]:
          - generic [ref=e614]:
            - region "English block p60" [ref=e615]:
              - paragraph [ref=e617]: This mode of operations has the desirable effect of giving P/C insurers cash before they incur most expenses but carries with it the risk that the company can be losing money - sometimes mountains of money - before the CEO and directors realize what is happening.
            - region "Chinese block p60" [ref=e618]:
              - paragraph [ref=e620]: 这种经营模式的好处，是财险公司在多数支出发生前就先拿到了现金；但与此同时，它也带来一种风险：在 CEO 和董事会意识到发生了什么之前，公司可能已经在亏钱——有时甚至亏掉一座山那样多的钱。
        - article [ref=e621]:
          - generic [ref=e622]:
            - region "English block p61" [ref=e623]:
              - paragraph [ref=e625]: "Certain lines of insurance minimize this mismatch, such as crop insurance or hail damage in which losses are quickly reported, evaluated and paid. Other lines, however, can lead to executive and shareholder bliss as the company is going broke. Think coverages such as medical malpractice or product liability. In long-tail lines, a P/C insurer may report large but fictitious profits to its owners and regulators for many years - even decades. The accounting can be particularly dangerous if the CEO is an optimist or a crook. These possibilities are not fanciful: history reveals a large number of each species."
            - region "Chinese block p61" [ref=e626]:
              - paragraph [ref=e628]: 某些险种会减轻这种时间错配，比如农作物保险或冰雹损失保险，因为损失会很快被报告、评估并赔付。但另一些险种则可能让公司在走向破产时，管理层和股东还沉浸在“幸福”之中。比如医疗事故责任险或产品责任险。对于“长尾”险种来说，一家财险公司可能在很多年、甚至几十年里都向股东和监管者报告着巨额但虚假的利润。如果 CEO 是个乐观主义者，或者是个骗子，这种会计处理就尤其危险。这并不是危言耸听：历史上，这两类人都不少见。
        - article [ref=e629]:
          - generic [ref=e630]:
            - region "English block p62" [ref=e631]:
              - paragraph [ref=e633]: In recent decades, this money-up-front, loss-payments-later model has allowed Berkshire to invest large sums of float while generally delivering what we believe to be a small underwriting profit. We make estimates for surprises and, so far, these estimates have been sufficient.
            - region "Chinese block p62" [ref=e634]:
              - paragraph [ref=e636]: 在过去几十年里，这种“钱先收进来、赔款后支付”的模式，让伯克希尔得以运用大规模浮存金进行投资，同时通常还能实现我们认为虽小但真实的承保利润。我们会为各种“意外”预留估计，而到目前为止，这些估计都还足够。
        - article [ref=e637]:
          - generic [ref=e638]:
            - region "English block p63" [ref=e639]:
              - paragraph [ref=e641]: We are not deterred by the dramatic and growing loss payments sustained by our activities. As I write this, think wildfires. It's our job to price to absorb these and unemotionally take our lumps when surprises develop. It's also our job to contest runaway verdicts, spurious litigation and outright fraudulent behavior.
            - region "Chinese block p63" [ref=e642]:
              - paragraph [ref=e644]: 我们并不会因为业务中不断出现、且规模越来越大的赔付而退缩。写这封信时，你可以想想野火。我们的职责，就是把价格定到足以吸收这些损失；当意外发生时，也要不带情绪地承受打击。同样，反击那些失控的判决、毫无根据的诉讼和赤裸裸的欺诈，也是我们的职责。
        - article [ref=e645]:
          - generic [ref=e646]:
            - region "English block p64" [ref=e647]:
              - paragraph [ref=e649]: Under Ajit, our insurance operation has blossomed from an obscure Omaha-based company into a world leader, renowned for both its taste for risk and its Gibraltar-like financial strength. Moreover, Greg, our directors and I all have a very large investment in Berkshire in relation to any compensation we receive. We do not use options or other one-sided forms of compensation; if you lose money, so do we. This approach encourages caution but does not ensure foresight.
            - region "Chinese block p64" [ref=e650]:
              - paragraph [ref=e652]: 在 Ajit 的带领下，我们的保险业务已经从一家名不见经传、总部设在奥马哈的公司，成长为世界级领导者，以敢于承担风险和如直布罗陀般稳固的财务实力著称。此外，格雷格、董事会成员和我本人，在伯克希尔上的投资，相对于我们领取的任何薪酬来说都非常大。我们不使用期权或其他单边受益的薪酬形式；如果你们亏钱，我们也一样亏钱。这种机制会鼓励谨慎，但并不能保证我们拥有预见力。
        - article [ref=e653]:
          - generic [ref=e654]:
            - region "English block p65" [ref=e655]:
              - paragraph [ref=e657]: P/C insurance growth is dependent on increased economic risk. No risk - no need for insurance. Think back only 135 years when the world had no autos, trucks or airplanes. Now there are 300 million vehicles in the U.S. alone, a massive fleet causing huge damage daily. Property damage arising from hurricanes, tornadoes and wildfires is massive, growing and increasingly unpredictable in their patterns and eventual costs.
            - region "Chinese block p65" [ref=e658]:
              - paragraph [ref=e660]: 财险业务的增长，依赖于经济风险的增加。没有风险，也就没有保险需求。回想 135 年前，那时世界上还没有汽车、卡车或飞机。如今，仅美国就有 3 亿辆机动车，这样庞大的车队每天都在制造巨额损失。飓风、龙卷风和野火带来的财产损失规模庞大、持续增长，而且其发生模式和最终成本也越来越难以预测。
        - article [ref=e661]:
          - generic [ref=e662]:
            - region "English block p66" [ref=e663]:
              - paragraph [ref=e665]: It would be foolish - make that madness - to write ten-year policies for these coverages, but we believe one-year assumption of such risks is generally manageable. If we change our minds, we will change the contracts we offer. During my lifetime, auto insurers have generally abandoned one-year policies and switched to the six-month variety. This change reduced float but allowed more intelligent underwriting.
            - region "Chinese block p66" [ref=e666]:
              - paragraph [ref=e668]: 为这类风险签发十年期保单，是愚蠢的——不，如此做简直是疯狂。但我们认为，按一年期承担这类风险通常仍然可控。如果我们的看法改变了，我们就会改变所提供的合同。在我的有生之年里，汽车保险公司大多已经放弃了一年期保单，转而采用六个月期保单。这样的变化虽然减少了浮存金，却让承保决策更加理性。
        - article [ref=e669]:
          - generic [ref=e670]:
            - region "English block p67" [ref=e671]:
              - paragraph [ref=e673]: No private insurer has the willingness to take on the amount of risk that Berkshire can provide. At times, this advantage can be important. But we also need to shrink when prices are inadequate. We must never write inadequately-priced policies in order to stay in the game. That policy is corporate suicide.
            - region "Chinese block p67" [ref=e674]:
              - paragraph [ref=e676]: 没有哪家民营保险公司愿意承担伯克希尔能承担的那种风险规模。在某些时候，这种优势会非常重要。但当价格不合理时，我们同样必须收缩业务。我们绝不能为了留在牌桌上，而去承保那些定价不足的保单。那样的策略，等同于企业自杀。
        - article [ref=e677]:
          - generic [ref=e678]:
            - region "English block p68" [ref=e679]:
              - paragraph [ref=e681]: "Properly pricing P/C insurance is part art, part science and is definitely not a business for optimists. Mike Goldberg, the Berkshire executive who recruited Ajit, said it best: \"We want our underwriters to daily come to work nervous, but not paralyzed.\""
            - region "Chinese block p68" [ref=e682]:
              - paragraph [ref=e684]: 给财产险和意外险定出合适价格，一部分是艺术，一部分是科学，而且它绝对不是乐观主义者适合干的生意。把 Ajit 招进来的伯克希尔高管 Mike Goldberg 说得最好：“我们希望承保员每天上班时都带着一点紧张感，但不要被吓瘫。”
        - article [ref=e685]:
          - generic [ref=e686]:
            - region "English block p69" [ref=e687]:
              - paragraph [ref=e689]: All things considered, we like the P/C insurance business. Berkshire can financially and psychologically handle extreme losses without blinking. We are also not dependent on reinsurers and that gives us a material and enduring cost advantage. Finally, we have outstanding managers and are particularly well-situated to utilize the substantial sums P/C insurance delivers for investment.
            - region "Chinese block p69" [ref=e690]:
              - paragraph [ref=e692]: 综合来看，我们喜欢财险这门生意。伯克希尔无论在财务上还是心理上，都能面不改色地承受极端损失。我们也不依赖再保险公司，这给了我们实实在在且持久的成本优势。最后，我们拥有出色的管理者，而且在运用财险业务带来的庞大投资资金方面，我们处于特别有利的位置。
        - article [ref=e693]:
          - generic [ref=e694]:
            - region "English block p70" [ref=e695]:
              - paragraph [ref=e697]: Over the past two decades, our insurance business has generated $32 billion of after-tax profits from underwriting, about 3.3 cents per dollar of sales after income tax. Meanwhile, our float has grown from $46 billion to $171 billion. The float is likely to grow a bit over time and, with intelligent underwriting and some luck, has a reasonable prospect of being costless.
            - region "Chinese block p70" [ref=e698]:
              - paragraph [ref=e700]: 在过去二十年里，我们的保险业务通过承保实现了 320 亿美元的税后利润，折算下来大约是每 1 美元保费收入贡献 3.3 美分税后利润。与此同时，我们的浮存金从 460 亿美元增长到了 1710 亿美元。未来浮存金很可能还会继续小幅增长，而且只要承保足够理性、再加上一点运气，它就有相当大的希望成为“零成本资金”。
        - article [ref=e701]:
          - generic [ref=e702]:
            - region "English block p71" [ref=e703]:
              - paragraph [ref=e705]: Berkshire Increases its Japanese Investments
            - region "Chinese block p71" [ref=e706]:
              - paragraph [ref=e708]: 伯克希尔增持日本投资
        - article [ref=e709]:
          - generic [ref=e710]:
            - region "English block p72" [ref=e711]:
              - paragraph [ref=e713]: A small but important exception to our U.S.-based focus is our growing investment in Japan. It's been almost six years since Berkshire began purchasing shares in five Japanese companies that very successfully operate in a manner somewhat similar to Berkshire itself. The five are ITOCHU, Marubeni, Mitsubishi, Mitsui and Sumitomo.
            - region "Chinese block p72" [ref=e714]:
              - paragraph [ref=e716]: 在我们以美国为主的投资重点之外，有一个虽小但重要的例外，那就是我们在日本不断增长的投资。伯克希尔开始买入五家日本公司的股票，已经将近六年了。这五家公司都以某种与伯克希尔自身有些相似的方式，经营得非常成功。它们分别是：伊藤忠、丸红、三菱商事、三井物产和住友商事。
        - article [ref=e717]:
          - generic [ref=e718]:
            - region "English block p73" [ref=e719]:
              - paragraph [ref=e721]: Each of these large enterprises, in turn, owns interests in a vast array of businesses, many based in Japan but others that operate throughout the world. Berkshire made its first purchases involving the five in July 2019. We simply looked at their financial records and were amazed at the low prices of their stocks. As the years have passed, our admiration for these companies has consistently grown. Greg has met many times with them, and I regularly follow their progress. Both of us like their capital deployment, their managements and their attitude in respect to their investors.
            - region "Chinese block p73" [ref=e722]:
              - paragraph [ref=e724]: 这些大型企业各自又持有极其广泛的业务组合，其中很多扎根日本，也有不少业务遍布全球。伯克希尔在 2019 年 7 月首次买入这五家公司。我们当时只是翻看了它们的财务记录，就对其股票之低廉感到惊讶。随着时间推移，我们对这些公司的欣赏不断加深。格雷格和它们多次见面，我也持续关注它们的发展。我们都喜欢它们的资本配置方式、管理层表现，以及它们对待投资者的态度。
        - article [ref=e725]:
          - generic [ref=e726]:
            - region "English block p74" [ref=e727]:
              - paragraph [ref=e729]: Each of the five companies increase dividends when appropriate, they repurchase their shares when it is sensible to do so, and their top managers are far less aggressive in their compensation programs than their U.S. counterparts. Our holdings of the five are for the very long term, and we are committed to supporting their boards of directors.
            - region "Chinese block p74" [ref=e730]:
              - paragraph [ref=e732]: 这五家公司都会在合适的时候提高分红，在适当的时候回购股份，而且它们最高管理层的薪酬方案，远没有美国同行那样激进。我们对这五家公司的持股，都是以极长期为前提的，而且我们也承诺支持它们的董事会。
        - article [ref=e733]:
          - generic [ref=e734]:
            - region "English block p75" [ref=e735]:
              - paragraph [ref=e737]: From the start, we also agreed to keep Berkshire's holdings below 10% of each company's shares. But, as we approached this limit, the five companies agreed to moderately relax the ceiling. Over time, you will likely see Berkshire's ownership of all five increase somewhat.
            - region "Chinese block p75" [ref=e738]:
              - paragraph [ref=e740]: 从一开始，我们也同意把伯克希尔在每家公司中的持股比例控制在 10% 以下。但随着我们逐渐接近这一上限，这五家公司同意适度放宽这个天花板。随着时间推移，你们很可能会看到伯克希尔在这五家公司中的持股都再增加一些。
        - article [ref=e741]:
          - generic [ref=e742]:
            - region "English block p76" [ref=e743]:
              - paragraph [ref=e745]: At yearend, Berkshire's aggregate cost in dollars was $13.8 billion and the market value of our holdings totaled $23.5 billion. Meanwhile, Berkshire has consistently - but not pursuant to any formula - increased its yen-denominated borrowings. All are at fixed rates, no floaters. Greg and I have no view on future foreign exchange rates and therefore seek a position approximating currency-neutrality.
            - region "Chinese block p76" [ref=e746]:
              - paragraph [ref=e748]: 到年末，伯克希尔这批投资按美元计算的总成本为 138 亿美元，而持仓市值合计达到 235 亿美元。与此同时，伯克希尔也持续增加了日元计价借款——但这并不是按什么固定公式机械执行的。所有借款都是固定利率，没有浮动利率。格雷格和我对未来汇率没有判断，因此我们追求的是一种大致中性的货币敞口。
        - article [ref=e749]:
          - generic [ref=e750]:
            - region "English block p77" [ref=e751]:
              - paragraph [ref=e753]: We are required, however, under GAAP rules to regularly recognize in our earnings a calculation of any gains or losses in the yen we have borrowed and, at yearend, had included $2.3 billion of after-tax gains due to dollar strength of which $850 million occurred in 2024.
            - region "Chinese block p77" [ref=e754]:
              - paragraph [ref=e756]: 不过，按照 GAAP 规则，我们必须定期在利润中确认日元借款所带来的汇兑损益。到年末为止，由于美元走强，我们已经计入了 23 亿美元税后收益，其中 2024 年当年发生的部分为 8.5 亿美元。
        - article [ref=e757]:
          - generic [ref=e758]:
            - region "English block p78" [ref=e759]:
              - paragraph [ref=e761]: I expect that Greg and his eventual successors will be holding this Japanese position for many decades and that Berkshire will find other ways to work productively with the five companies in the future. We like the current math of our yen-balanced strategy as well. As I write this, the annual dividend income expected from the Japanese investments in 2025 will total about $812 million and the interest cost of our yen-denominated debt will be about $135 million.
            - region "Chinese block p78" [ref=e762]:
              - paragraph [ref=e764]: 我预计，格雷格以及他未来的继任者，会在未来很多很多年里都继续持有这批日本投资，而且伯克希尔未来还会找到其他方式，与这五家公司开展富有成效的合作。我们也喜欢当前这种“日元对冲”策略的账面数学。写这封信时，我们预期 2025 年来自这些日本投资的年度股息收入大约为 8.12 亿美元，而日元债务的利息成本大约为 1.35 亿美元。
        - article [ref=e765]:
          - generic [ref=e766]:
            - region "English block p79" [ref=e767]:
              - paragraph [ref=e769]: The Annual Gathering in Omaha
            - region "Chinese block p79" [ref=e770]:
              - paragraph [ref=e772]: 奥马哈年度聚会
        - article [ref=e773]:
          - generic [ref=e774]:
            - region "English block p80" [ref=e775]:
              - paragraph [ref=e777]: I hope you will join us in Omaha on May 3rd. We are following a somewhat changed schedule this year, but the basics remain the same. Our goal is that you get many of your questions answered, that you connect with friends, and that you leave with a good impression of Omaha. The city looks forward to your visits.
            - region "Chinese block p80" [ref=e778]:
              - paragraph [ref=e780]: 我希望你能在 5 月 3 日来奥马哈和我们相聚。今年我们的日程安排做了一些调整，但基本框架没有变化。我们的目标，是让你有很多问题得到解答，能和朋友相聚，并带着对奥马哈的良好印象离开。整座城市都期待着你们的到来。
        - article [ref=e781]:
          - generic [ref=e782]:
            - region "English block p81" [ref=e783]:
              - paragraph [ref=e785]: We will have much the same group of volunteers to offer you a wide variety of Berkshire products that will lighten your wallet and brighten your day. As usual, we will be open on Friday from noon until 5 p.m. with lovable Squishmallows, underwear from Fruit of the Loom, Brooks running shoes and a host of other items to tempt you.
            - region "Chinese block p81" [ref=e786]:
              - paragraph [ref=e788]: 我们仍会由一批老面孔志愿者为大家提供各种伯克希尔产品，它们会让你的钱包变轻，但也会让你心情愉快。和往年一样，我们会在周五中午到下午 5 点开放展区，里面会有可爱的 Squishmallows、Fruit of the Loom 的内衣、Brooks 跑鞋，以及一大堆其他诱人的商品。
        - article [ref=e789]:
          - generic [ref=e790]:
            - region "English block p82" [ref=e791]:
              - paragraph [ref=e793]: Again, we will have only one book for sale. Last year we featured Poor Charlie's Almanack and sold out - 5,000 copies disappeared before the close of business on Saturday. This year we will offer 60 Years of Berkshire Hathaway.
            - region "Chinese block p82" [ref=e794]:
              - paragraph [ref=e796]: 今年我们仍然只卖一本书。去年我们卖的是《穷查理宝典》，结果售罄——5000 本在周六营业结束前就全部卖光。今年我们要卖的是《伯克希尔·哈撒韦 60 年》。
        - article [ref=e797]:
          - generic [ref=e798]:
            - region "English block p83" [ref=e799]:
              - paragraph [ref=e801]: In 2015, I asked Carrie Sova, who among her many duties managed much of the activity at the annual meeting, to try her hand at putting together a light-hearted history of Berkshire. I gave her full rein to use her imagination, and she quickly produced a book that blew me away with its ingenuity, contents and design.
            - region "Chinese block p83" [ref=e802]:
              - paragraph [ref=e804]: 2015 年，我请 Carrie Sova 试着整理一本轻松风格的伯克希尔历史。当时她除了很多日常职责之外，还管理着年度大会的大量事务。我给了她完全自由的创作空间，她很快就做出了一本让我惊叹不已的书——无论创意、内容还是设计，都让我印象深刻。
        - article [ref=e805]:
          - generic [ref=e806]:
            - region "English block p84" [ref=e807]:
              - paragraph [ref=e809]: Subsequently, Carrie left Berkshire to raise a family and now has three children. But each summer, the Berkshire office force gets together to watch the Omaha Storm Chasers play baseball against a Triple A opponent. I ask a few alums to join us, and Carrie usually comes with her family. At this year's event, I brazenly asked her if she would do a 60th Anniversary issue, featuring Charlie's photos, quotes and stories that have seldom been made public.
            - region "Chinese block p84" [ref=e810]:
              - paragraph [ref=e812]: 后来，Carrie 离开伯克希尔去照顾家庭，如今已经有了三个孩子。但每年夏天，伯克希尔办公室的人都会聚在一起，看奥马哈 Storm Chasers 队和一支 3A 级别球队打棒球。我也会邀请几位老同事一起参加，而 Carrie 通常会带着家人来。今年那次活动上，我厚着脸皮问她，愿不愿意再做一本 60 周年特别版，加入许多很少公开过的查理照片、语录和故事。
        - article [ref=e813]:
          - generic [ref=e814]:
            - region "English block p85" [ref=e815]:
              - paragraph [ref=e817]: Even with three young children to manage, Carrie immediately said "yes." Consequently, we will have 5,000 copies of the new book available for sale on Friday afternoon and from 7 a.m. to 4 p.m. on Saturday.
            - region "Chinese block p85" [ref=e818]:
              - paragraph [ref=e820]: 尽管她还要照顾三个年幼的孩子，Carrie 还是立刻答应了。于是，这本新书将会准备 5000 册，在周五下午以及周六早上 7 点到下午 4 点期间发售。
        - article [ref=e821]:
          - generic [ref=e822]:
            - region "English block p86" [ref=e823]:
              - paragraph [ref=e825]: Carrie refused any payment for her extensive work on the new Charlie edition. I suggested she and I co-sign 20 copies to be given to any shareholder contributing $5,000 to the Stephen Center that serves homeless adults and children in South Omaha. The Kizer family, beginning with Bill Kizer Sr., my long-time friend and Carrie's grandfather, have for decades been assisting this worthy institution. Whatever is raised through the sale of the 20 autographed books, I will match.
            - region "Chinese block p86" [ref=e826]:
              - paragraph [ref=e828]: 对于她在这本新版“查理纪念版”上投入的大量工作，Carrie 拒绝接受任何报酬。于是我提议，她和我一起在 20 册书上签名，赠送给那些向 Stephen Center 捐出 5000 美元的股东。Stephen Center 主要帮助南奥马哈的无家可归成人和儿童。Kizer 家族——从我的老朋友、也是 Carrie 祖父的 Bill Kizer Sr. 开始——几十年来一直在支持这个值得尊敬的机构。通过这 20 本签名书筹到的每一美元，我都会等额配捐。
        - article [ref=e829]:
          - generic [ref=e830]:
            - region "English block p87" [ref=e831]:
              - paragraph [ref=e833]: Becky Quick will cover our somewhat re-engineered gathering on Saturday. Becky knows Berkshire like a book and always arranges interesting interviews with managers, investors, shareholders and an occasional celebrity. She and her CNBC crew do a great job of both transmitting our meetings worldwide and archiving much Berkshire-related material. Give our director, Steve Burke, credit for the archive idea.
            - region "Chinese block p87" [ref=e834]:
              - paragraph [ref=e836]: 贝姬·奎克将继续负责报道这场做了一些“重新设计”的周六聚会。贝姬对伯克希尔的了解可以说如数家珍，她总能安排管理层、投资者、股东，甚至偶尔还有名人参与的有趣访谈。她和 CNBC 团队在把我们的会议传播到全世界、以及整理保存大量与伯克希尔有关的资料方面都做得非常出色。至于“建立档案库”这个主意，要把功劳记到我们的董事 Steve Burke 头上。
        - article [ref=e837]:
          - generic [ref=e838]:
            - region "English block p88" [ref=e839]:
              - paragraph [ref=e841]: We will not have a movie this year but rather will convene a bit earlier at 8 a.m. I will make a few introductory remarks, and we will promptly get to the Q&A, alternating questions between Becky and the audience.
            - region "Chinese block p88" [ref=e842]:
              - paragraph [ref=e844]: 今年我们不会播放开场影片，而是会更早一些，在早上 8 点开始。我会先做几句开场白，然后就马上进入问答环节，由贝姬和现场观众轮流提问。
        - article [ref=e845]:
          - generic [ref=e846]:
            - region "English block p89" [ref=e847]:
              - paragraph [ref=e849]: Greg and Ajit will join me in answering questions and we will take a half-hour break at 10:30 a.m. When we reconvene at 11:00 a.m., only Greg will join me on stage. This year we will disband at 1:00 p.m. but stay open for shopping in the exhibit area until 4:00 p.m. You can find the full details regarding weekend activities on page 16. Note particularly the always-popular Brooks run on Sunday morning. I will be sleeping.
            - region "Chinese block p89" [ref=e850]:
              - paragraph [ref=e852]: 格雷格和 Ajit 会和我一起回答问题，我们将在上午 10:30 休息半小时。11:00 重新开始后，台上将只剩格雷格和我。今年的会议将在下午 1 点结束，但展区购物会继续开放到下午 4 点。周末活动的完整安排可以见第 16 页。尤其值得注意的，是一如既往很受欢迎的周日早晨 Brooks 跑步活动——至于我，那时会在睡觉。
        - article [ref=e853]:
          - generic [ref=e854]:
            - region "English block p90" [ref=e855]:
              - paragraph [ref=e857]: My wise and good-looking sister, Bertie, of whom I wrote last year, will be attending the meeting along with two of her daughters, both good-looking as well. Observers all agree that the genes producing this dazzling result flow down only the female side of the family.
            - region "Chinese block p90" [ref=e858]:
              - paragraph [ref=e860]: 去年我曾写到我那位聪明又好看的姐姐 Bertie，今年她也会来参加大会，还会带上她的两个女儿——她们同样很好看。所有旁观者一致认为，造就这种耀眼结果的基因，只在我们家族的女性这一支上流传。
        - article [ref=e861]:
          - generic [ref=e862]:
            - region "English block p91" [ref=e863]:
              - paragraph [ref=e865]: Bertie is now 91 and we talk regularly on Sundays using old-fashioned telephones for communications. We cover the joys of old age and discuss such exciting topics as the relative merits of our canes. In my case, the utility is limited to the avoidance of falling flat on my face.
            - region "Chinese block p91" [ref=e866]:
              - paragraph [ref=e868]: Bertie 现在已经 91 岁了。我们每周日都会通过老式电话聊天，谈论老年的种种快乐，以及像“彼此手杖哪根更好”这样令人兴奋的话题。就我而言，手杖的用途主要仅限于避免让我整张脸朝下摔到地上。
        - article [ref=e869]:
          - generic [ref=e870]:
            - region "English block p92" [ref=e871]:
              - paragraph [ref=e873]: "But Bertie regularly one-ups me by asserting that she enjoys an additional benefit: When a woman uses a cane, she tells me, men quit \"hitting\" on her. Bertie's explanation is that the male ego is such that little old ladies with canes simply aren't an appropriate target. Presently, I have no data to counter her assertion."
            - region "Chinese block p92" [ref=e874]:
              - paragraph [ref=e876]: 但 Bertie 总能在这一点上赢过我，因为她声称手杖还有额外好处：她告诉我，女人一旦拄起手杖，男人就不会再“搭讪”她了。Bertie 的解释是，男性的自尊心会让他们觉得：一个拄着手杖的小老太太显然不是合适的“目标”。眼下，我并没有什么数据可以反驳她的说法。
        - article [ref=e877]:
          - generic [ref=e878]:
            - region "English block p93" [ref=e879]:
              - paragraph [ref=e881]: But I have suspicions. At the meeting I can't see much from the stage, and I would appreciate it if attendees would keep an eye on Bertie. Let me know if the cane is really doing its job. My bet is that she will be surrounded by males. For those of a certain age, the scene will bring back memories of Scarlett O'Hara and her horde of male admirers in Gone with the Wind.
            - region "Chinese block p93" [ref=e882]:
              - paragraph [ref=e884]: 但我对此持保留意见。大会当天，我在台上看不到太多东西，所以如果参会者能替我留意一下 Bertie，我会很感激。请告诉我，那根手杖到底有没有真正发挥作用。我打赌，她身边还是会围着一群男士。对某个年龄段的人来说，那一幕恐怕会让人想起《乱世佳人》里 Scarlett O'Hara 被众多男性追逐的场面。
        - article [ref=e885]:
          - generic [ref=e886]:
            - region "English block p94" [ref=e887]:
              - paragraph [ref=e889]: The Berkshire directors and I immensely enjoy having you come to Omaha, and I predict that you will have a good time and likely make some new friends. February 22, 2025. Warren E. Buffett, Chairman of the Board.
            - region "Chinese block p94" [ref=e890]:
              - paragraph [ref=e892]: 伯克希尔的董事们和我都非常享受你们来到奥马哈的这段时光。我相信，你们会过得很愉快，而且很可能还能结识一些新朋友。2025 年 2 月 22 日。沃伦·E·巴菲特，董事长。
